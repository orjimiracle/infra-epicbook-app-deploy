trigger:
  branches:
    include:
    - main
pool:
  name: 'EpicBook-Pool'
variables:
- group: epicbook-secrets
- name: azureServiceConnection
  value: 'AzureRM-Conn'
- name: VM_IP
  value: '102.133.224.68'
- name: VM_USER
  value: 'azureuser'
- name: DB_HOST
  value: 'epicbook-server-1e2fc0.mysql.database.azure.com'
stages:
- stage: DeployApp
  displayName: 'Deploy EpicBook Application'
  jobs:
  - job: AnsibleJob
    steps:
    - task: CmdLine@2
      displayName: 'System Prep'
      inputs:
        script: |
          sudo apt-get update -y
          sudo apt-get install -y ansible unzip
    - task: DownloadSecureFile@1
      name: ssh_key
      displayName: 'Download SSH Private Key'
      inputs:
        secureFile: 'azure_rsa'
    - task: CmdLine@2
      displayName: 'Validate Key File'
      inputs:
        script: |
          echo "--- Validating key file ---"
          chmod 600 $(ssh_key.secureFilePath)
          head -1 $(ssh_key.secureFilePath)
          tail -1 $(ssh_key.secureFilePath)
          wc -l $(ssh_key.secureFilePath)
          echo "--- Derived public key ---"
          ssh-keygen -y -f $(ssh_key.secureFilePath)
    - task: CmdLine@2
      displayName: 'Configure SSH Access'
      inputs:
        script: |
          mkdir -p ~/.ssh
          cp $(ssh_key.secureFilePath) ~/.ssh/azure_rsa
          chmod 600 ~/.ssh/azure_rsa
          ssh-keyscan -H $(VM_IP) >> ~/.ssh/known_hosts
    - task: CmdLine@2
      displayName: 'Test SSH Connection'
      inputs:
        script: |
          ssh -i ~/.ssh/azure_rsa -o StrictHostKeyChecking=no $(VM_USER)@$(VM_IP) "echo SSH_OK"
    - task: CmdLine@2
      displayName: 'Run Ansible Playbook'
      inputs:
        script: |
          ansible-playbook -i inventory.ini site.yml \
            -u $(VM_USER) \
            --private-key ~/.ssh/azure_rsa \
            -e "db_password=$(db_password)" \
            -e "db_user=$(db_user)" \
            -e "db_name=$(db_name)" \
            -e "db_host=$(DB_HOST)"

