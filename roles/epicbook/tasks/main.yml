---
# 1. PREPARE DIRECTORY
- name: Ensure the parent directory exists
  become: yes
  file:
    path: "{{ app_dest }}"
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

# 2. CLONE CODE
- name: Clone the EpicBook repository
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dest }}"
    version: main
    force: yes
  become: yes
  become_user: azureuser

# 3. DOWNLOAD SSL CERT (Fix: Added validate_certs and become)
- name: Download Azure MySQL CA Certificate
  get_url:
    url: https://cacerts.digicert.com/DigiCertGlobalRootG2.crt.pem
    dest: "{{ app_dest }}/config/azure-db-ca.pem"
    owner: azureuser
    mode: '0644'
    validate_certs: yes
  become: yes

# 4. CONFIGURE DATABASE CONNECTION
- name: Configure Sequelize database connection with SSL
  template:
    src: config.json.j2
    dest: "{{ app_dest }}/config/config.json"
    owner: azureuser
    group: azureuser
    mode: '0644'
    force: yes
  become: yes

# 5. INITIALIZE DATABASE
- name: Create the bookstore database if it does not exist
  shell: "mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_pass }}' -e 'CREATE DATABASE IF NOT EXISTS {{ db_name }};'"
  register: create_db_result
  changed_when: "'1 row affected' in create_db_result.stdout"

# 6. INSTALL DEPENDENCIES
- name: Install NPM dependencies
  npm:
    path: "{{ app_dest }}"
  become: yes
  become_user: azureuser

# 7. SEED TABLES
- name: Check if database tables already exist
  shell: "mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_pass }}' {{ db_name }} -e 'SHOW TABLES;'"
  register: db_check
  changed_when: false

- name: Seed database schemas
  shell: "mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_pass }}' {{ db_name }} < {{ app_dest }}/db/{{ item }}"
  loop:
    - BuyTheBook_Schema.sql
    - author_seed.sql
    - books_seed.sql
  when: "db_check.stdout == ''"

# 8. START THE APPLICATION
- name: Manage EpicBook process with PM2
  shell: |
    export HOME=/home/azureuser
    pm2 delete epicbook || true
    pm2 start server.js --name epicbook
    pm2 save
  args:
    chdir: "{{ app_dest }}"
  become: yes
  become_user: azureuser