---
- name: Prepare system (common)
  hosts: web
  become: true
  roles:
    - { role: common, tags: ["common"] }

- name: Install and configure Nginx
  hosts: web
  become: true
  roles:
    - { role: nginx, tags: ["nginx"] }

- name: Deploy EpicBook app
  hosts: web
  become: true
  roles:
    - { role: epicbook, tags: ["epicbook"] }